<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#09090E" />
      <stop offset="100%" stop-color="#14141E" />
    </linearGradient>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00F0FF" />
      <stop offset="100%" stop-color="#5773FF" />
    </linearGradient>
    <linearGradient id="grad2" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FF007A" />
      <stop offset="100%" stop-color="#7928CA" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="12" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>
  
  <rect width="512" height="512" rx="112" fill="url(#bg)" />
  
  <g filter="url(#glow)">
    <!-- The Eye of Focus -->
    <path d="M 112 256 C 112 256 200 144 256 144 C 312 144 400 256 400 256 C 400 256 312 368 256 368 C 200 368 112 256 112 256 Z" fill="none" stroke="url(#grad1)" stroke-width="28" stroke-linejoin="round" stroke-linecap="round" />
    
    <!-- The System Core -->
    <circle cx="256" cy="256" r="60" fill="none" stroke="url(#grad2)" stroke-width="24" />
    <circle cx="256" cy="256" r="24" fill="url(#grad1)" />
    
    <!-- System Nodes -->
    <circle cx="256" cy="144" r="16" fill="url(#grad2)" />
    <circle cx="256" cy="368" r="16" fill="url(#grad2)" />
    <circle cx="112" cy="256" r="16" fill="url(#grad2)" />
    <circle cx="400" cy="256" r="16" fill="url(#grad2)" />
  </g>
</svg>
